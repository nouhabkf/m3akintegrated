name: appm3ak
description: "Ma3ak - Application mobile pour personnes en situation de handicap en Tunisie et leurs accompagnants."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0-290.4.beta

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP & Storage
  http: ^1.2.0
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.3

  # Navigation
  go_router: ^14.6.2

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Image handling
  image_picker: ^1.1.2

  # Utils
  equatable: ^2.0.7
  url_launcher: ^6.3.1
  json_annotation: ^4.9.0

  # M3AK (port inclusion : Provider + caméra / ML / médias)
  provider: ^6.1.2
  google_fonts: ^6.2.1
  camera: ^0.11.0+2
  google_mlkit_pose_detection: ^0.13.0
  google_ml_kit: ^0.19.0
  google_mlkit_face_detection: ^0.12.0
  tflite_flutter: ^0.11.0
  image: ^4.5.3
  path_provider: ^2.1.5
  vibration: ^3.1.3
  sensors_plus: ^6.1.1
  lottie: ^3.3.1
  permission_handler: ^11.3.1
  geolocator: ^13.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  qr_flutter: ^4.1.0
  video_player: ^2.9.2
  speech_to_text: ^7.0.0

  # Accessibilité — lecture à voix haute des descriptions d’image
  flutter_tts: ^4.2.3
  # Aligne record_linux / record_platform_interface (évite RecordLinux.startStream manquant au build).
  record: ^6.0.0

# Si un autre paquet tire encore record_linux 0.7.x, on force une version compatible avec record_platform_interface 1.5+.
  intl: any
dependency_overrides:
  record_linux: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/accessibility/
    - assets/images/
    - assets/animations/
    - assets/videos/
    - assets/models/
  fonts:
    - family: NotoSansSymbols2
      fonts:
        - asset: assets/fonts/NotoSansSymbols2-Regular.ttf
